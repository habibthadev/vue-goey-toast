name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Sync version and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from CHANGELOG
        id: changelog_version
        run: |
          VERSION=$(grep -m1 '## \[[0-9]' CHANGELOG.md | sed 's/## \[\(.*\)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from CHANGELOG.md"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Check if version exists on npm
        id: version_changed
        run: |
          VERSION=${{ steps.changelog_version.outputs.version }}
          if npm view vue-goey-toast@$VERSION version 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published, skipping"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION not on npm, will publish"
          fi

      - name: Configure git
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync package.json version
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          VERSION=${{ steps.changelog_version.outputs.version }}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            git add package.json
            git commit -m "chore: release v$VERSION [skip ci]"
            git push origin main
          else
            echo "package.json already at $VERSION, skipping commit"
          fi

      - name: Type check
        if: steps.version_changed.outputs.changed == 'true'
        run: pnpm typecheck

      - name: Lint
        if: steps.version_changed.outputs.changed == 'true'
        run: pnpm lint

      - name: Build
        if: steps.version_changed.outputs.changed == 'true'
        run: pnpm build

      - name: Test
        if: steps.version_changed.outputs.changed == 'true'
        run: pnpm test

      - name: Tag release
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          VERSION=${{ steps.changelog_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping tag creation"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Publish to npm
        if: steps.version_changed.outputs.changed == 'true'
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.version_changed.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog_version.outputs.version }}
          name: v${{ steps.changelog_version.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
